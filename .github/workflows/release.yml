name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package version
        id: version
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Stop when release already exists
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release view $env:TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            "exists=true" >> $env:GITHUB_OUTPUT
          }
          else {
            "exists=false" >> $env:GITHUB_OUTPUT
          }

      - name: Verify release tag exists
        if: steps.release.outputs.exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git rev-parse --verify $env:TAG

      - name: Set up Node.js
        if: steps.release.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Verify package
        if: steps.release.outputs.exists == 'false'
        run: |
          npm ci --ignore-scripts
          npm run check
          npm audit --audit-level=moderate

      - name: Build release ZIP
        if: steps.release.outputs.exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git archive --format=zip --prefix="codex-rtl-toolkit-v$env:VERSION/" --output="codex-rtl-toolkit-v$env:VERSION.zip" $env:TAG

      - name: Create GitHub release
        if: steps.release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $notesFile = "docs/releases/$env:TAG.md"
          if (-not (Test-Path $notesFile)) {
            $notesFile = "README.md"
          }

          gh release create $env:TAG "codex-rtl-toolkit-v$env:VERSION.zip" `
            --title "$env:TAG - ChatGPT Desktop support" `
            --notes-file $notesFile
